<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FlowNote" />
  <meta name="description" content="FlowNote — notes, to-dos & calendar in one minimalist app. Eat That Frog every morning." />
  <meta name="theme-color" content="#f2f2f7" />
  <meta property="og:title" content="FlowNote — Eat That Frog" />
  <meta property="og:description" content="Your focus companion. Notes, tasks & calendar. Build daily streaks." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://flownote-two.vercel.app" />
  <title>FlowNote — Eat That Frog</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    #fn-loader{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:12px;
      background:#f2f2f7;z-index:9999;
    }
    #fn-loader .logo{font-size:48px;}
    #fn-loader .name{font-size:22px;font-weight:800;color:#1c1c1e;}
    #fn-loader .sub{font-size:14px;color:#636366;}
    #fn-loader .spinner{
      width:28px;height:28px;border:3px solid #e5e5ea;
      border-top-color:#6c63ff;border-radius:50%;
      animation:spin .7s linear infinite;margin-top:8px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <!-- Loading screen shown until app.js builds the real UI -->
  <div id="fn-loader">
    <div class="logo">🐸</div>
    <div class="name">FlowNote</div>
    <div class="sub">Eat That Frog</div>
    <div class="spinner"></div>
  </div>

  <!-- app.js builds the entire UI, removes loader when ready -->
  <script src="./app.js"></script>
</body>
</html>
